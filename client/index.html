<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Trip System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <div id="roleSelect">
        <h1>Annual Trip System</h1>
        <button onclick="selectRole('teacher')">Login as Teacher</button>
        <button onclick="selectRole('student')">Login as Student / Parent</button>
    </div>

    <div id="loginTeacher" style="display: none">
        <h1>Annual Trip System</h1>
        <input type="text" id="teacherId" placeholder="Enter ID number">
        <button onclick="login()">Login</button>
        <button onclick="goBack('loginTeacher')">Back</button>
        <p id="loginError" style="color: red; display: none">ID not found in the system</p>
    </div>

    <div id="loginStudent" style="display: none">
        <h1>Annual Trip System</h1>
        <input type="text" id="studentLoginId" placeholder="Enter student ID number">
        <button onclick="loginStudent()">Login</button>
        <button onclick="goBack('loginStudent')">Back</button>
        <p id="loginStudentError" style="color: red; display: none">ID not found in the system</p>
    </div>

<div id="mainSection" style="display: none">
    
    <button onclick="goBack('mainSection')">Logout</button>
    <button onclick="showTab('students')">Students</button>
    <button onclick="showTab('teachers')">Teachers</button>

    <div id="studentsTab" style="display:none">
        <h2>Add Student</h2>
        <form id="studentForm">
            <input type="text" id="studentFirstName" placeholder="First name">
            <input type="text" id="studentLastName" placeholder="Last name">
            <input type="text" id="studentId" placeholder="ID number">
            <button type="submit">Add Student</button>
        </form>

        <h2>View</h2>
        <button onclick="getAllStudents()">All Students</button>
        <button onclick="getMyClass()">My Class Students</button>
        <input type="text" id="searchStudentId" placeholder="Search by ID">
        <button onclick="getStudent()">Search</button>
        
        <div id="studentsResult"></div>
    </div>

    <div id="teachersTab" style="display:none">
        <h2>Add Teacher</h2>
        <form id="teacherForm">
            <input type="text" id="teacherFirstName" placeholder="First name">
            <input type="text" id="teacherLastName" placeholder="Last name">
            <input type="text" id="teacherIdentity" placeholder="ID number">
            <input type="text" id="teacherClass" placeholder="Class">
            <button type="submit">Add Teacher</button>
        </form>

        <h2>View</h2>
        <button onclick="getAllTeachers()">All Teachers</button>
        <input type="text" id="searchTeacherId" placeholder="Search by ID">
        <button onclick="getTeacher()">Search</button>
        
        <div id="teachersResult"></div>
    </div>

    <button onclick="showTab('map')">Map</button>
    <div id="mapTab" style="display: none;">
        <h2>Students Location</h2>
        <div id="map" style="height: 500px;"></div>
        <button onclick="checkDistance()">Check Students Distance</button>
        <div id="studentsDistanceList" style="margin-top: 15px;"></div>
    </div>

</div>

    <div id="parentView" style="display: none">
        <h2>Students Location</h2>
        <button onclick="goBack('parentView')">Back</button>
        <div id="parentMap" style="height: 500px;"></div>
        <div id="studentInfo" style="margin-top: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 8px;"></div>
    </div>

    <script src="app.js"></script>
    
</body>
</html>
